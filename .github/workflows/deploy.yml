name: Auto Deploy to DigitalOcean Server

# මේකෙන් කියන්නේ main බ්‍රාන්ච් එකට කෝඩ් එක Push කරපු ගමන් මේක වැඩ කරන්න පටන් ගන්න කියලා
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploying code to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/reproute-backend
            git pull origin main
            systemctl restart reproute-backend